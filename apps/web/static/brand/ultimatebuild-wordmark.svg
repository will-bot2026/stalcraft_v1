<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 220" role="img" aria-labelledby="title desc">
  <title id="title">UltimateBuild wordmark</title>
  <desc id="desc">UltimateBuild logo with angular cyan artifact mark and geometric technical wordmark.</desc>
  <defs>
    <linearGradient id="shell" x1="39" y1="20" x2="182" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2d3a43"/>
      <stop offset="0.48" stop-color="#121b25"/>
      <stop offset="1" stop-color="#05080d"/>
    </linearGradient>
    <linearGradient id="edge" x1="36" y1="17" x2="184" y2="204" gradientUnits="userSpaceOnUse">
